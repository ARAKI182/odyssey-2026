<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Quill pen cursor - tip at top-left for accurate click point -->
  <g transform="rotate(0)">
    <!-- Quill shaft -->
    <path d="M4 4 L14 18 L12 20 L2 6Z" fill="#c9a84c" opacity="0.9"/>
    <!-- Feather vane -->
    <path d="M14 18 C18 12, 24 8, 30 2 C28 10, 22 16, 14 18Z" fill="#d4c5a0" opacity="0.7"/>
    <path d="M14 18 C16 14, 20 10, 28 4 C24 10, 18 16, 14 18Z" fill="#c9a84c" opacity="0.4"/>
    <!-- Feather detail lines -->
    <line x1="16" y1="16" x2="26" y2="4" stroke="#6b5d4f" stroke-width="0.5" opacity="0.5"/>
    <line x1="15" y1="17" x2="28" y2="6" stroke="#6b5d4f" stroke-width="0.3" opacity="0.4"/>
    <!-- Nib tip -->
    <path d="M4 4 L2 6 L1 5Z" fill="#8b3a3a"/>
  </g>
</svg>
